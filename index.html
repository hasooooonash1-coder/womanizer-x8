<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق الموعد المثالي</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        
        #bg-video {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            object-fit: cover;
            /* التأكد من عمل الفيديو على كافة الأجهزة */
        }

        .container {
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            padding: 20px;
            text-align: center; 
            color: white;
            background: rgba(0, 0, 0, 0.5);
        }

        .content { 
            background: rgba(0, 0, 0, 0.7); 
            padding: 30px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 500px; 
        }
        
        h1 { margin: 0 0 20px 0; font-size: 1.6rem; }
        p { margin-bottom: 25px; font-size: 1.1rem; }
        
        .trackable-link { 
            text-decoration: none; 
            display: block; 
            width: 100%; 
        }
        
        button {
            padding: 15px 30px; 
            font-size: 1.2rem; 
            cursor: pointer;
            background-color: #ff4757; 
            color: white; 
            border: none;
            border-radius: 50px; 
            width: 100%; 
            font-weight: bold;
            -webkit-appearance: none; /* لمنع تنسيقات الآيفون الافتراضية */
        }
    </style>
</head>
<body>

    <!-- تم إضافة الخصائص اللازمة لضمان التشغيل في iOS -->
    <video autoplay muted loop playsinline webkit-playsinline id="bg-video">
        <source src="ضع اسم الفديو هنا">
    </video>

    <div class="container">
        <div class="content">
            <h1>هل أنت جاهز لتحديد موعدك المثالي؟</h1>
            <p>أجب على الأسئلة التلقائية في التطبيق أدناه للبدء</p>
            
            <a href="https://trustedoffers.pro/a/VOqK5SZ6WFQJwz" class="trackable-link">
                <button>ابدأ الآن</button>
            </a>
        </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        let uniqueClickId = 'org_' + Math.floor(Math.random() * 100000) + '_' + Date.now();
        let referrer = document.referrer.toLowerCase();
        let trafficSource = "Direct_or_Hidden"; 
        
        if (referrer.includes("facebook.com") || referrer.includes("fb.com") || referrer.includes("m.facebook")) { trafficSource = "Facebook"; }
        else if (referrer.includes("instagram.com")) { trafficSource = "Instagram"; }
        else if (referrer.includes("tiktok.com")) { trafficSource = "TikTok"; }
        else if (referrer.includes("youtube.com") || referrer.includes("youtu.be")) { trafficSource = "YouTube"; }
        else if (referrer.includes("twitter.com") || referrer.includes("t.co") || referrer.includes("x.com")) { trafficSource = "X_Twitter"; }
        else if (referrer !== "") { try { let url = new URL(referrer); trafficSource = url.hostname.replace('www.', ''); } catch (e) { trafficSource = "Other_Website"; } }

        const urlParams = new URLSearchParams(window.location.search);
        urlParams.set('clickid', uniqueClickId);
        urlParams.set('sub1', trafficSource);
        urlParams.set('sub2', window.location.hostname);
        
        const links = document.querySelectorAll('a.trackable-link');
        links.forEach(function(link) {
          let originalUrl = link.getAttribute('href');
          if (originalUrl) {
            let separator = originalUrl.includes('?') ? '&' : '?';
            let newUrl = originalUrl + separator + urlParams.toString();
            link.setAttribute('href', newUrl);
          }
        });
      });
    </script>
</body>
</html>
